services:
  # Service 1: PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: sysmlv2-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sysmlv2
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sysmlv2"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Service 2: SysML v2 API
  sysml-api:
    build:
      context: ./sysmlv2_api
    container_name: sysmlv2-api
    ports:
      - "9000:9000"
      - "8888:8888"  # Expose the Jupyter port for direct access if needed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PLAY_SECRET: ${PLAY_SECRET}
      # preferIPv4Stack=true: prevents Java from resolving 'localhost' as [::1] (IPv6),
      # which would cause connection refused since Play binds to 0.0.0.0 (IPv4 only).
      JAVA_OPTS: "--add-opens java.base/java.lang=ALL-UNNAMED -Djava.net.preferIPv4Stack=true"
    healthcheck:
      # Play Framework + Hibernate startup is slow (JVM warmup + schema update).
      # start_period gives it time before failed checks count against retries.
      test: ["CMD-SHELL", "curl -sf --max-time 5 http://localhost:9000/projects -o /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  # Service 3: Jupyter with SysMLv2 Kernel
  jupyter:
    build:
      context: ./sysmlv2_jupyter_env
    container_name: sysmlv2-jupyter
    network_mode: "service:sysml-api"  # Use the same network as the sysml-api service to allow direct communication
    depends_on:
      sysml-api:
        condition: service_healthy
    # ports:
    #   - "8888:8888"
    environment:
      JUPYTER_PASSWORD: ${JUPYTER_PASSWORD}
    volumes:
    # Bind mount this entire directory to the Jupyter container so that changes to files are registere locally.
    # Note that significant changes to files from other Git repos pulled may cause sync issues when those repos
    # are updated, so we may want to consider bind mounting only specific subdirectories in the future.
      - .:/mbse

volumes:
  postgres_data:
