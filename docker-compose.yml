services:
  # Service 1: PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: sysmlv2-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sysmlv2
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sysmlv2"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Service 2: SysML v2 API
  sysml-api:
    build:
      context: ./sysmlv2_api
    container_name: sysmlv2-api
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PLAY_SECRET: ${PLAY_SECRET}
      JAVA_OPTS: "--add-opens java.base/java.lang=ALL-UNNAMED"

  # Service 3: Jupyter with SysMLv2 Kernel
  jupyter:
    build:
      context: ./sysmlv2_jupyter_env
    container_name: sysmlv2-jupyter
    ports:
      - "8888:8888"

volumes:
  postgres_data:
